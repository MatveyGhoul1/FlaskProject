<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — УЧЕБА.ХАБ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body class="profile-page">

    <header class="header_strip">
        <a href="/main" class="logo">УЧЕБА.ХАБ</a>
        
        <div class="auth_box">
            <div class="profile_status">Личный профиль</div>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle">
                    <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" alt="User">
                </div>
                <h2>{{ current_user.surname }} {{ current_user.name }} {{ current_user.patronymic }}</h2>
                <span class="user-tag">Ученик</span>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label>Дата рождения</label>
                    <p>{{ current_user.birth_date.strftime('%d.%m.%Y') }}</p>
                </div>
                <div class="info-item">
                    <label>Никнейм</label>
                    <p>{{ current_user.nickname }}</p>
                </div>
                <div class="info-item">
                    <label>Электронная почта</label>
                    <p>{{ current_user.email }}</p>
                </div>
                <div class="info-item">
                    <label>Школа</label>
                    <p>{{ current_user.school }}</p>
                </div>
                <div class="info-item">
                    <label>Класс</label>
                    <p>{{ current_user.klass }}</p>
                </div>
            </div>
            <div class="profile-footer">
                <a href="/logout" class="logout-card-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Выйти из системы</span> 
                </a>
            </div>
        </div>
    </div>

</body>
</html>
